# ── Google Sheets Connection ──────────────────────────────────────────────────
#
#  SETUP STEPS (one-time):
#  1. console.cloud.google.com → Enable "Google Sheets API" + "Google Drive API"
#  2. IAM & Admin → Service Accounts → Create → Download JSON key
#  3. Copy the ENTIRE JSON file contents into private_key_json below
#  4. Open your Google Sheet → Share → paste the client_email → Editor → Send
#
# ─────────────────────────────────────────────────────────────────────────────

[connections.gsheets]
spreadsheet = "https://docs.google.com/spreadsheets/d/1cWzMMmuJsmYCy9L-GOyAbwSzAmAe7zD9v4a3yUdPJOA/edit?usp=drivesdk"

private_key_json = """
{
  "type": "service_account",
  "project_id": "YOUR_PROJECT_ID",
  "private_key_id": "YOUR_KEY_ID",
  "private_key": "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n",
  "client_email": "YOUR_SERVICE_ACCOUNT@YOUR_PROJECT.iam.gserviceaccount.com",
  "client_id": "YOUR_CLIENT_ID",
  "auth_uri": "https://accounts.google.com/o/oauth2/auth",
  "token_uri": "https://oauth2.googleapis.com/token",
  "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
  "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/YOUR_SERVICE_ACCOUNT"
}
"""

